<!DOCTYPE html>
<html>
<head>
    <title>CineSphere</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            max-width:900px;
            margin:40px auto;
            background:#f4f4f4;
            padding:20px;
        }

        h1{
            text-align:center;
        }

        .movie{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        a{
            text-decoration:none;
            color:#1565c0;
        }

        a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

<h1>🎬 CineSphere Movies</h1>

{% for movie in movies %}

<div class="movie">

<h2>
<a href="{% url 'social:movie_detail' movie.id %}">
{{ movie.title }}
</a>
</h2>

<p><strong>Year:</strong> {{ movie.release_year }}</p>

<p><strong>Runtime:</strong> {{ movie.runtime }} minutes</p>

<p><strong>Language:</strong> {{ movie.language }}</p>

<p>{{ movie.description }}</p>

</div>

{% empty %}

<p>No movies found.</p>

{% endfor %}

</body>
</html>
